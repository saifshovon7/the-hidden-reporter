<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Search — The Hidden Reporter</title>
  <meta name="description" content="Search news articles on The Hidden Reporter.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="/" class="logo-link" aria-label="The Hidden Reporter">
        <span class="logo-name">The Hidden Reporter</span>
        <span class="logo-tagline">Uncovering stories behind the headlines.</span>
      </a>
      <nav class="main-nav" id="main-nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/category/general.html">General</a>
        <a href="/category/technology.html">Technology</a>
        <a href="/category/business.html">Business</a>
        <a href="/category/science.html">Science</a>
        <a href="/category/world.html">World</a>
        <a href="/category/politics.html">Politics</a>
      </nav>
      <div class="header-actions">
        <button class="header-btn" aria-label="Search" onclick="toggleSearch()" id="search-toggle-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"
          onclick="toggleNav(this)">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div id="search-bar" class="header-search-bar" role="search" aria-hidden="true">
      <form action="/search.html" method="get" class="search-form">
        <input type="search" name="q" placeholder="Search articles…" class="search-input" id="header-search-input"
          autocomplete="off">
        <button type="submit" class="search-btn">Search</button>
      </form>
    </div>
  </header>

  <main class="site-main" id="main-content">
    <div class="layout-default">
      <div class="search-page-header">
        <h1 class="page-title">Search</h1>
      </div>
      <form action="/search.html" method="get" class="search-page-form">
        <input type="search" name="q" id="search-page-input" class="search-page-input" placeholder="Enter keywords…"
          autocomplete="off">
        <button type="submit" class="search-page-btn">Search</button>
      </form>
      <p class="search-results-count" id="search-results-count"></p>
      <div id="search-results"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">

        <a href="/editorial-policy.html">Editorial Policy</a>
        <a href="/contact.html">Contact</a>
        <a href="/feed.xml">RSS Feed</a>
