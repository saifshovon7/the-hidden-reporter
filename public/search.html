<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — The Hidden Reporter</title>
  <meta name="description" content="Search news articles on The Hidden Reporter.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <div class="header-date" id="site-date"></div>
        <div class="header-logo">
          <a href="/" class="logo-link">
            <span class="logo-name">The Hidden Reporter</span>
            <span class="logo-tagline">Uncovering stories behind the headlines.</span>
          </a>
        </div>
        <div class="header-search">
          <button class="search-toggle" aria-label="Toggle search" onclick="toggleSearch()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
          <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleNav(this)">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
      <div id="search-bar" class="search-bar" hidden>
        <form action="/search.html" method="get" class="search-form">
          <input type="search" name="q" placeholder="Search articles…" class="search-input" autofocus>
          <button type="submit" class="search-btn">Search</button>
        </form>
      </div>
      <nav class="main-nav" id="main-nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/category/general.html">General</a>
        <a href="/category/technology.html">Technology</a>
        <a href="/category/business.html">Business</a>
        <a href="/category/science.html">Science</a>
        <a href="/category/world.html">World</a>
        <a href="/category/politics.html">Politics</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="static-page">

      <div class="search-page-header">
        <h1 class="page-title">Search</h1>
      </div>

      <form action="/search.html" method="get" class="search-page-form">
        <input type="search" name="q" id="search-page-input" class="search-page-input" placeholder="Enter keywords…"
          autocomplete="off">
        <button type="submit" class="search-page-btn">Search</button>
      </form>

      <p class="search-results-count" id="search-results-count"></p>

      <div id="search-results"></div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <strong>The Hidden Reporter</strong><br>
        <em>Uncovering stories behind the headlines.</em>
      </div>
      <nav class="footer-nav">
        <a href="/about.html">About</a>
        <a href="/editorial-policy.html">Editorial Policy</a>
        <a href="/contact.html">Contact</a>
        <a href="/feed.xml">RSS Feed</a>
        <a href="/sitemap.xml">Sitemap</a>
      </nav>
      <p class="footer-copy">&copy; <span id="footer-year"></span> The Hidden Reporter. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/main.js" defer></script>
  <script>
    document.getElementById('site-date').textContent =
      new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>
</body>

</html>
